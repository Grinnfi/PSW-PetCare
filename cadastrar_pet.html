
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastrar Novo Pet</title>
</head>

<body>

<h1>Cadastrar Novo Pet</h1>
<p>Preencha os dados do seu animal de estimação.</p>

<hr>

<!-- Área para foto -->
<h2>Foto do Pet</h2>
<input type="file" name="foto_pet">

<hr>

<!-- Formulário -->
<form>

<h3>Dados do Pet</h3>

<label for="nome_pet">Nome do Pet</label><br>
<input type="text" id="nome_pet" name="nome_pet" placeholder="Ex: Rex">
<br><br>

<label for="raca">Raça</label><br>
<input type="text" id="raca" name="raca" placeholder="Ex: Golden Retriever">
<br><br>

<label for="idade">Idade</label><br>
<input type="text" id="idade" name="idade" placeholder="Ex: 2 anos">
<br><br>

<label for="peso">Peso</label><br>
<input type="text" id="peso" name="peso" placeholder="Ex: 15kg">
<br><br>

<h3>Dados do Dono</h3>

<label for="nome_dono">Nome do Dono</label><br>
<input type="text" id="nome_dono" name="nome_dono" placeholder="Ex: João Silva">
<br><br>

<!-- Botões -->
<button type="reset">Cancelar</button>
<button type="submit">Salvar Cadastro</button>

</form>

</body>
</html>
